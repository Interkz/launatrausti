name: Data Pipeline

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC
  workflow_dispatch: {}   # Manual trigger

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install httpx>=0.27.0 playwright pdfplumber anthropic beautifulsoup4
          playwright install chromium --with-deps

      - name: Scrape job listings
        run: python scripts/scrape_jobs.py

      - name: Extract job fields (AI)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/extract_jobs.py

      - name: Match employers to companies
        run: python scripts/match_companies.py

      - name: Estimate salaries
        run: python scripts/estimate_salaries.py

      - name: Run financial pipeline (stages 1-7)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SKATTURINN_API_KEY: ${{ secrets.SKATTURINN_API_KEY }}
        run: python scripts/run_pipeline.py --skip-jobs

      - name: Print stats
        run: python scripts/run_pipeline.py --stage 7

      - name: Commit database changes
        env:
          PIPELINE_DATE: ${{ github.event.repository.updated_at }}
        run: |
          git config user.name "Launatrausti Bot"
          git config user.email "bot@launatrausti.is"
          git add launatrausti.db
          COMMIT_DATE=$(date +%Y-%m-%d)
          git diff --cached --quiet || git commit -m "data: daily pipeline update ${COMMIT_DATE}"
          git push
